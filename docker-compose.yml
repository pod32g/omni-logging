# Omni-logging deployment. The image is built from the repo Dockerfile (a
# static, CGO-free binary on distroless). Log data lives in a named volume so it
# survives container recreation; the volume name is pinned so the deploy's
# backup/restore can address it directly.
services:
  omnilog:
    build: .
    image: omnilog:latest
    container_name: omnilog
    restart: unless-stopped
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    command: ["serve", "--addr", ":8080", "--db", "/data/omni.db", "--retention-days", "14"]
    ports:
      - "${OMNILOG_HOST_PORT:-8080}:8080"
    environment:
      # Optional secrets; set in a .env file next to this compose file.
      OMNILOG_ADMIN_TOKEN: ${OMNILOG_ADMIN_TOKEN:-}
      OMNILOG_INGEST_KEYS: ${OMNILOG_INGEST_KEYS:-}
      OMNILOG_METRICS_PUBLIC: ${OMNILOG_METRICS_PUBLIC:-false}
      # Optional self-monitoring: ship our own WARN+ logs to an omnilog server
      # (LOGSHIP_URL, usually this very process at http://127.0.0.1:8080). The
      # WARN minimum prevents an ingest→log→ship feedback loop. Off by default.
      LOGSHIP_ENABLED: ${LOGSHIP_ENABLED:-false}
      LOGSHIP_URL: ${LOGSHIP_URL:-}
      LOGSHIP_API_KEY: ${LOGSHIP_API_KEY:-}
      LOGSHIP_SERVICE: ${LOGSHIP_SERVICE:-omnilog}
    volumes:
      - omnilog-data:/data
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    healthcheck:
      # The distroless image has no shell/curl, so the binary probes itself.
      test: ["CMD", "/omnilog", "healthcheck", "--url", "http://localhost:8080/api/v1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  omnilog-data:
    name: omnilog-data
